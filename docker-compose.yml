# ============================================================
# YouDub Replica — Docker Compose
# Frontend (Vite + React + Nginx) + Backend (Spring Boot) + Python Services
# ============================================================

services:
  # ── Python Services (VoxCPM TTS + Audio Separation + Whisper) ─
  python-services:
    build:
      context: docker/youdub-python-services
      dockerfile: Dockerfile
    image: youdub-python-services:latest
    container_name: youdub-python-services
    ports:
      - "8001:8001"
    environment:
      - TZ=${TZ:-Asia/Shanghai}

      # ── Audio Separator ────────────────────────────────
      - SEPARATOR_MODEL=${SEPARATOR_MODEL:-UVR-MDX-NET-Inst_HQ_3.onnx}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - MODEL_DIR=/app/data/separator-models

      # ── Faster-Whisper ─────────────────────────────────
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_CPU_THREADS=${WHISPER_CPU_THREADS:-6}

      # ── VoxCPM TTS ────────────────────────────────────
      - VOXCPM_BACKEND=${VOXCPM_BACKEND:-auto}
      - VOXCPM_MODEL=${VOXCPM_MODEL:-OpenBMB/VoxCPM2}
      # 是否加载降噪器。VoxCPM 生成音频后，会用额外的降噪模型处理一遍来提升音质，但会增加加载耗时和显存占用。false 表示不加载，启动更快、占内存更少。
      - VOXCPM_LOAD_DENOISER=${VOXCPM_LOAD_DENOISER:-false}
      # Classifier-Free Guidance (CFG) 系数，控制生成结果对输入文本的遵从程度：
      #     - 值越小（如 1.0）：模型自由发挥，跟文本可能不太像
      #     - 值越大（如 3.0~5.0）：严格按文本生成，但可能声音不自然
      #     - 2.0：平衡值，默认推荐
      - VOXCPM_CFG_VALUE=${VOXCPM_CFG_VALUE:-2.5}
      # 推理步数。VoxCPM 是扩散模型，需要多步迭代生成音频：
      #     - 步数越多：质量越好，但生成越慢（线性增长）
      #     - 步数越少：生成快，但音质可能下降
      #     - 10：默认值，速度和质量的平衡点。如果追求极致音质可以调到 20~50，追求速度可以降到 5
      - VOXCPM_INFERENCE_TIMESTEPS=${VOXCPM_INFERENCE_TIMESTEPS:-10}
      - MODEL_CACHE_DIR=/app/data/modelscope
      - PRELOAD_MODELS=${PRELOAD_MODELS:-false}

      # ── General ────────────────────────
      - CUDA_DEVICE=${CUDA_DEVICE:-}
      - SERVICE_PORT=8001
      # HF_ENDPOINT配置可能会报错
      #- HF_ENDPOINT=https://hf-mirror.com
      - HF_HUB_OFFLINE=0
      - HTTP_PROXY=http://dengwei.local:7890
      - HTTPS_PROXY=http://dengwei.local:7890
      - NO_PROXY=localhost,127.0.0.1,dengwei.local
    volumes:
      - /mnt/e/youdub-data/modelscope:/app/data/modelscope
      - /mnt/e/youdub-data/separator-models:/app/data/separator-models
      - ./docker/youdub-python-services/server.py:/app/server.py:ro
    command: python -m uvicorn server:app --host 0.0.0.0 --port 8001 --log-level info --reload
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - youdub-network
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Java 后端 ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youdub-backend
    ports:
      - "8000:8000"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - APP_TTS_PROVIDER=${TTS_PROVIDER:-voxcpm}
      - APP_TTS_VOXCPM_SERVICE_URL=${VOXCPM_SERVICE_URL:-http://python-services:8001}
      - APP_SEPARATE_AUDIO_SEPARATOR_API_SERVICE_URL=${AUDIO_SEPARATOR_SERVICE_URL:-http://python-services:8001}
      - APP_TRANSLATE_MODEL=${TRANSLATE_MODEL:-gpt-4o-mini}
      - APP_TRANSLATE_CONCURRENCY=${TRANSLATE_CONCURRENCY:-50}
      - APP_WORKFOLDER=/app/workfolder
      - APP_DATA_DIR=/app/data
      - APP_COOKIE_DIR=/app/data/cookies
      - APP_LOG_DIR=/app/data/logs
      - APP_DB_PATH=/app/data/youdub.sqlite
      - APP_YTDLP_PROXY_HOST=${YTDLP_PROXY_HOST:-}
      - APP_YTDLP_PROXY_PORT=${YTDLP_PROXY_PORT:-}
    volumes:
      - /mnt/e/youdub-data/backend:/app/data
      - /mnt/e/youdub-data/workfolder:/app/workfolder
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - youdub-network

  # ── 前端 (Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: youdub-frontend
    ports:
      - "3000:3000"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    restart: unless-stopped
    networks:
      - youdub-network

networks:
  youdub-network:
    driver: bridge
