# ============================================================
# YouDub Replica — Docker Compose
# Frontend (Vite + React + Nginx) + Backend (Spring Boot) + VoxCPM TTS
# ============================================================

services:
  # ── Python Services (TTS + Audio Separation + Whisper) ─
  python-services:
    build:
      context: docker/youdub-python-services
      dockerfile: Dockerfile
    image: youdub-python-services:latest
    container_name: youdub-python-services
    ports:
      - "8002:8001"
    environment:
      - SEPARATOR_MODEL=${SEPARATOR_MODEL:-UVR-MDX-NET-Inst_HQ_3.onnx}
      - SEPARATOR_NUM_PROCESSES=${SEPARATOR_NUM_PROCESSES:-4}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - MODEL_DIR=/app/models
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      # VoxCPM 后端：auto=根据 GPU 自动选择，voxcpm=强制原生 PyTorch，llamacpp=强制 llama.cpp-omni
      - VOXCPM_BACKEND=${VOXCPM_BACKEND:-auto}
      - VOXCPM_MODEL=${VOXCPM_MODEL:-OpenBMB/VoxCPM2}
      - VOXCPM_LOAD_DENOISER=${VOXCPM_LOAD_DENOISER:-false}
      - VOXCPM_CFG_VALUE=${VOXCPM_CFG_VALUE:-2.0}
      - VOXCPM_INFERENCE_TIMESTEPS=${VOXCPM_INFERENCE_TIMESTEPS:-10}
      - MODEL_CACHE_DIR=/app/data/modelscope
      - PRELOAD_MODELS=${PRELOAD_MODELS:-true}
      # llama.cpp-omni CPU fallback 配置
      - VOXCPM_LLAMACPP_DIR=/app/voxcpm2
      - VOXCPM_LLAMACPP_BASELM=${VOXCPM_LLAMACPP_BASELM:-VoxCPM2-BaseLM-Q8_0.gguf}
      - VOXCPM_LLAMACPP_ACOUSTIC=${VOXCPM_LLAMACPP_ACOUSTIC:-VoxCPM2-Acoustic-F16.gguf}
      - VOXCPM_LLAMACPP_REPO=${VOXCPM_LLAMACPP_REPO:-DennisHuang/VoxCPM2-GGUF}
      - VOXCPM_LLAMACPP_THREADS=${VOXCPM_LLAMACPP_THREADS:-4}
      - VOXCPM_LLAMACPP_PROMPT_TEXT_MODE=${VOXCPM_LLAMACPP_PROMPT_TEXT_MODE:-auto}
      # HF 镜像（中国大陆加速，效果参考 ollama 容器配置）
      - HF_ENDPOINT=https://hf-mirror.com
      # 强制离线模式：模型已缓存后不再发网络请求校验
      - HF_HUB_OFFLINE=1
      - HTTP_PROXY=http://dengwei.local:7890
      - HTTPS_PROXY=http://dengwei.local:7890
      - NO_PROXY=localhost,127.0.0.1,dengwei.local
    volumes:
      - youdub-models:/app/data/modelscope
      - youdub-separator-models:/app/models
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - youdub-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Java 后端 ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youdub-backend
    ports:
      - "8000:8000"
    environment:
      - APP_TTS_PROVIDER=${TTS_PROVIDER:-voxcpm}
      - APP_TTS_VOXCPM_SERVICE_URL=${VOXCPM_SERVICE_URL:-http://python-services:8001}
      - APP_SEPARATE_AUDIO_SEPARATOR_API_SERVICE_URL=${AUDIO_SEPARATOR_SERVICE_URL:-http://python-services:8001}
      - APP_TRANSLATE_MODEL=${TRANSLATE_MODEL:-gpt-4o-mini}
      - APP_TRANSLATE_CONCURRENCY=${TRANSLATE_CONCURRENCY:-50}
      - APP_WORKFOLDER=/app/workfolder
      - APP_DATA_DIR=/app/data
      - APP_COOKIE_DIR=/app/data/cookies
      - APP_LOG_DIR=/app/data/logs
      - APP_DB_PATH=/app/data/youdub.sqlite
      - APP_YTDLP_PROXY_HOST=${YTDLP_PROXY_HOST:-}
      - APP_YTDLP_PROXY_PORT=${YTDLP_PROXY_PORT:-}
    volumes:
      - youdub-data:/app/data
      - youdub-workfolder:/app/workfolder
    depends_on:
      - python-services
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - youdub-network

  # ── 前端 (Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: youdub-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - youdub-network

volumes:
  youdub-data:
  youdub-workfolder:
  youdub-models:
  youdub-separator-models:

networks:
  youdub-network:
    driver: bridge
