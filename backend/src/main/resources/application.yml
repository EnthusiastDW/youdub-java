server:
  port: 8000

spring:
  application:
    name: youdub-replica
  datasource:
    url: jdbc:sqlite:${app.db-path:data/youdub.sqlite}
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  servlet:
    multipart:
      max-file-size: 4096MB
      max-request-size: 4096MB

app:
  workfolder: ${APP_WORKFOLDER:workfolder}
  data-dir: ${APP_DATA_DIR:data}
  cookie-dir: ${APP_COOKIE_DIR:data/cookies}
  log-dir: ${APP_LOG_DIR:data/logs}
  db-path: ${APP_DB_PATH:./data/youdub.sqlite}
  device: ${APP_DEVICE:auto}
  upload-max-bytes: ${APP_UPLOAD_MAX_BYTES:4294967296}
  subtitle-max-bytes: ${APP_SUBTITLE_MAX_BYTES:20971520}

  ytdlp:
    proxy: http://dengwei.local:7890

  asr:
    provider: whisper-api
    whisper-api:
      base-url: http://192.168.1.2:8001
      url: http://192.168.1.2:8001/v1/audio/transcriptions
      api-key: skxxx
      model: whisper-1
    whisper-cpp:
      model: ggml-large-v3-turbo.bin
  asr-corrector:
    provider: openai-asr-corrector
    openai-asr-corrector:
      enabled: false

  tts:
    provider: voxcpm
    edge-tts:
      path: edge-tts
      voice: zh-CN-YunyangNeural
    openai-tts:
      url: https://api.openai.com/v1/audio/speech
      api-key: skxxx
      model: tts-1
      voice: alloy
    voxcpm:
      service-url: http://192.168.1.2:8001/v1/tts

  translate:
    provider: openai
    ollama:
      base-url: http://192.168.1.2:11434
      model: qwen2.5:7b
      concurrency: 1
    openai:
      chat-url: https://api.openai.com/v1/chat/completions
      api-key: ""
      model: gpt-4o-mini
      concurrency: 50

  separate:
    provider: audio-separator-api
    ffmpeg-simple: {}
    demucs:
      model: htdemucs_ft
    audio-separator-api:
      service-url: http://192.168.1.2:8001

  audio:
    sample-rate: ${APP_AUDIO_SAMPLE_RATE:44100}
    segment-sample-rate: ${APP_AUDIO_SEGMENT_SAMPLE_RATE:22050}
    channels: ${APP_AUDIO_CHANNELS:2}
    segment-channels: ${APP_AUDIO_SEGMENT_CHANNELS:1}

  ffmpeg:
    path: ${APP_FFMPEG_PATH:ffmpeg}
    probe-path: ${APP_FFPROBE_PATH:ffprobe}
    encoder: ${APP_FFMPEG_ENCODER:}         # 可选：nvenc / qsv / amf / videotoolbox，留空则自动检测

  download:
    output-filename: ${APP_DOWNLOAD_OUTPUT_FILENAME:video_source.mp4}
    timeout-ms: ${APP_DOWNLOAD_TIMEOUT_MS:300000}

  device-config:
    demucs: ${APP_DEVICE_DEMUCS:}
    whisper: ${APP_DEVICE_WHISPER:}

  pipeline:
    concurrency:
      download: 2
      separate: 2
      asr: 2
      asr_correct: 2
      asr_fix: 4
      translate: 2
      split_audio: 4
      tts: 1
      merge_audio: 2
      merge_video: 1
