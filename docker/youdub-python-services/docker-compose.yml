# ============================================================
# Python Services — Standalone Docker Compose
# Combines: Audio Separator + Faster-Whisper + VoxCPM TTS
# Use this file to run the Python services independently:
#   docker compose -f docker/python-services/docker-compose.yml up -d
# ============================================================

services:
  python-services:
    build:
      context: .
      dockerfile: Dockerfile
    image: youdub-python-services:latest
    container_name: youdub-python-services
    ports:
      - "8001:8001"
    environment:
      # ── Audio Separator ────────────────────────────────
      - SEPARATOR_MODEL=${SEPARATOR_MODEL:-UVR-MDX-NET-Inst_HQ_3.onnx}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-6}
      - MODEL_DIR=/app/data/separator-models

      # ── Faster-Whisper ─────────────────────────────────
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_CPU_THREADS=${WHISPER_CPU_THREADS:-6}

      # ── VoxCPM TTS ────────────────────────────────────
      - VOXCPM_BACKEND=${VOXCPM_BACKEND:-auto}
      - VOXCPM_MODEL=${VOXCPM_MODEL:-OpenBMB/VoxCPM2}
      # 是否加载降噪器。VoxCPM 生成音频后，会用额外的降噪模型处理一遍来提升音质，但会增加加载耗时和显存占用。false 表示不加载，启动更快、占内存更少。
      - VOXCPM_LOAD_DENOISER=${VOXCPM_LOAD_DENOISER:-false}
      # Classifier-Free Guidance (CFG) 系数，控制生成结果对输入文本的遵从程度：
      #     - 值越小（如 1.0）：模型自由发挥，跟文本可能不太像
      #     - 值越大（如 3.0~5.0）：严格按文本生成，但可能声音不自然
      #     - 2.0：平衡值，默认推荐
      - VOXCPM_CFG_VALUE=${VOXCPM_CFG_VALUE:-2.5}
      # 推理步数。VoxCPM 是扩散模型，需要多步迭代生成音频：
      #     - 步数越多：质量越好，但生成越慢（线性增长）
      #     - 步数越少：生成快，但音质可能下降
      #     - 10：默认值，速度和质量的平衡点。如果追求极致音质可以调到 20~50，追求速度可以降到 5
      - VOXCPM_INFERENCE_TIMESTEPS=${VOXCPM_INFERENCE_TIMESTEPS:-10}
      - MODEL_CACHE_DIR=/app/data/modelscope
      - PRELOAD_MODELS=${PRELOAD_MODELS:-false}

      # ── General ────────────────────────
      - CUDA_DEVICE=${CUDA_DEVICE:-}
      - SERVICE_PORT=8001
    volumes:
      - ../../data/python-services:/app/data
      - ./server.py:/app/server.py:ro
    command: python -m uvicorn server:app --host 0.0.0.0 --port 8001 --log-level info --reload
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # ── GPU Support (uncomment for NVIDIA GPU) ─────────
