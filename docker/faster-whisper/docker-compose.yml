version: "3.8"

services:
  faster-whisper:
    build:
      context: .
      dockerfile: Dockerfile
    image: youdub-whisper:latest
    container_name: youdub-whisper
    ports:
      - "9000:9000"
    environment:
      # ===== 模型配置 =====
      # 模型大小: tiny / base / small / medium / large-v3
      # 建议: CPU 16GB DDR3 推荐 small，兼顾速度与准确率
      - WHISPER_MODEL=base
      # CPU 推理（你有 R9 370，CUDA 不能用）
      - WHISPER_DEVICE=cpu
      # int8 量化：省内存、速度快，精度损失极小
      - WHISPER_COMPUTE_TYPE=int8
      # CPU 线程数，建议 = 物理核心数，不要超线程数
      - WHISPER_CPU_THREADS=4
    volumes:
      # 模型缓存持久化，避免每次重启重新下载（~500MB+）
      - whisper-models:/root/.cache/huggingface
      # 如需挂载额外音频输入目录，取消注释下面这行
      # - ./audio:/audio:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whisper-models:
