# ============================================================
# VoxCPM TTS 服务 — 独立 Docker Compose
# 可单独部署，供外部调用（如 youdub-replica 后端）
# ============================================================

services:
  voxcpm:
    build:
      context: .
      dockerfile: Dockerfile
    image: youdub-voxcpm:latest
    container_name: youdub-voxcpm
    ports:
      - "8001:8001"
    environment:
      # ── 模型配置 ────────────────────────────────────────
      # ModelScope 模型名（VOXCPM_MODEL_DIR 为空时从此下载）
      - VOXCPM_MODEL=${VOXCPM_MODEL:-OpenBMB/VoxCPM2}
      # 本地模型目录（非空时优先）
      - VOXCPM_MODEL_DIR=${VOXCPM_MODEL_DIR:-}
      # 是否加载降噪器
      - VOXCPM_LOAD_DENOISER=${VOXCPM_LOAD_DENOISER:-false}
      # CFG 值（越高越贴合参考音频，2.0 适中）
      - VOXCPM_CFG_VALUE=${VOXCPM_CFG_VALUE:-2.0}
      # 推理步数（越高质量越好，但更慢）
      - VOXCPM_INFERENCE_TIMESTEPS=${VOXCPM_INFERENCE_TIMESTEPS:-10}

      # ── 服务配置 ────────────────────────────────────────
      # 模型缓存目录（持久化到 volume）
      - MODEL_CACHE_DIR=/app/data/modelscope
      # CUDA 设备（空 = 由 voxcpm 自动选择）
      - CUDA_DEVICE=${CUDA_DEVICE:-}

    volumes:
      # 模型缓存持久化，避免每次重启从 ModelScope 重新下载（~2GB+）
      - voxcpm-models:/app/data/modelscope

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # ── GPU 加速（NVIDIA）────────────────────────────────
    # 取消注释以下行以启用 GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  voxcpm-models:
